# Local development infrastructure for NexusQuant.
# Provides prod-parity PostgreSQL and Redis. Application tests do NOT require this
# (they use in-memory SQLite / fakeredis) — this is for running services against
# realistic persistence.
services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusquant-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusquant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusquant"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexusquant-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
