# Root test configuration for the whole monorepo.
# ``importlib`` import mode lets independently-packaged services reuse test-module
# basenames (test_api.py, test_cache.py, …) without collection collisions.
[pytest]
asyncio_mode = auto
addopts = --import-mode=importlib
testpaths =
    packages/nexus-shared/tests
    packages/nexus-platform/tests
    services/event_fabric/tests
    services/data_platform/tests
    services/market_intelligence/tests
    services/strategy_core/tests
