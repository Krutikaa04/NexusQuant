[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexus-shared"
version = "0.1.0"
description = "NexusQuant shared kernel — event contracts and domain primitives only (no business logic)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_shared"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
