[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexus-platform"
version = "0.1.0"
description = "NexusQuant technical infrastructure kernel — async DB session, base repository, cache, and migration runner. No domain logic."
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "aiosqlite>=0.20",
]

[project.optional-dependencies]
redis = ["redis>=5.0"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "fakeredis>=2.20",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_platform"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
